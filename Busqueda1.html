<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Busqueda Personas</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
  </head>
  <body>
    <main>
      <div class="container">
        <form id="formulario">
          <h1>Consulta API - DNI</h1>
          <input
            type="text"
            id="dni"
            placeholder="Ingrese Aqui su DNI"
            required|
          />
          <small>Ejemplo: 60745420</small>
          <button type="submit" id="btnBuscar">Buscar Info del API</button>
        </form>
        <!-- Aqui se muestran los resultados de la consulta -->
        <div id="resultados"></div>
      </div>
    </main>
    <script>
      document.addEventListener("DOMContentLoaded", (event) => {
        /* Metodo para avbreriar la invocacion del Document.getElementById */
        /* No da Falta Supscripcion */
        const $ = (selector) => document.getElementById(selector);

        const formulario = $("formulario");
        const dni = $("dni");
        const btnBuscar = $("btnBuscar");
        const resultados = $("resultados");

        const fetchInfo = (dni) => {
          return fetch(`http://localhost:3000/api/dni/${dni}`)
            .then((res) => res.json())
            .catch((error) => console.error(error));
        };

        formulario.addEventListener("submit", async (event) => {
          event.preventDefault();
          const { value } = dni;
          if (!value) return;

          btnBuscar.setAttribute("disabled", "");
          btnBuscar.setAttribute("aria-busy", "true");

          const dniinfo = await fetchInfo(value);

          if (dniinfo) {
            resultados.innerHTML = JSON.stringify(dniinfo, null, 2);
          }

          btnBuscar.removeAttribute("disabled");
          btnBuscar.removeAttribute("aria-busy");
        });
      });
    </script>
  </body>
</html>
